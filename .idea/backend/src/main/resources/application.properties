# ===================================
# LUMA Backend Configuration
# ===================================
# QUAN TRONG: Tao file .env trong thu muc backend/ voi cac bien moi truong
# Xem file .env.example de biet cac bien can thiet

spring.application.name=luma-backend

# ===================================
# SQL Server Database Configuration
# ===================================
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=luma_db;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===================================
# JPA / Hibernate Configuration
# ===================================
# PRODUCTION: doi thanh 'validate' hoac 'none'
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ===================================
# Server Configuration
# ===================================
server.port=${SERVER_PORT:8080}

# ===================================
# JWT Configuration
# ===================================
# QUAN TRONG: Thay doi JWT_SECRET trong production!
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===================================
# OpenAPI/Swagger Configuration
# ===================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
# PRODUCTION: vo hieu hoa swagger
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# ===================================
# Mail Configuration
# ===================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================
# File Upload Configuration
# ===================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================
# Cloudinary Configuration
# ===================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ===================================
# Google OAuth Configuration
# ===================================
google.client-id=${GOOGLE_CLIENT_ID}

# ===================================
# Stripe Payment Configuration
# ===================================
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.currency=${STRIPE_CURRENCY:usd}

# ===================================
# App Configuration
# ===================================
app.base-url=${APP_BASE_URL:http://localhost:5000}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ===================================
# Logging Configuration
# ===================================
# PRODUCTION: doi thanh INFO hoac WARN
logging.level.com.luma=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}

# ===================================
# DevTools Configuration (Chi dung cho Development)
# ===================================
spring.devtools.restart.enabled=${DEVTOOLS_ENABLED:false}
spring.devtools.livereload.enabled=${DEVTOOLS_ENABLED:false}
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

# ===================================
# Groq AI Configuration
# ===================================
groq.api-key=${GROQ_API_KEY}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# ===================================
# Rate Limiting Configuration
# ===================================
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.login.requests-per-minute=${RATE_LIMIT_LOGIN:10}
rate-limit.register.requests-per-minute=${RATE_LIMIT_REGISTER:5}
rate-limit.api.requests-per-minute=${RATE_LIMIT_API:100}

# ===================================
# Google Calendar Configuration
# ===================================
google.calendar.client-id=${GOOGLE_CALENDAR_CLIENT_ID:${GOOGLE_CLIENT_ID:}}
google.calendar.client-secret=${GOOGLE_CALENDAR_CLIENT_SECRET:}
google.calendar.redirect-uri=${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:3000/calendar/callback}

# ===================================
# Payout Configuration
# ===================================
payout.platform-fee-percent=${PAYOUT_PLATFORM_FEE_PERCENT:5.00}
payout.delay-hours=${PAYOUT_DELAY_HOURS:48}
