<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LUMA — discover, book and manage events in one place.">

  <!-- Google Sign-In Client ID -->
  <meta name="google-signin-client_id" content="749860554682-561q7d9r0rqihph1jkb7jhrsdlv9t72u.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LUMA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LUMA</title>
  <link rel="manifest" href="manifest.json">

  <!-- Disable browser cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <!-- Stripe.js for payment processing -->
  <script src="https://js.stripe.com/v3/"></script>

  <!-- Force unregister old service workers that cache stale files -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var reg of registrations) { reg.unregister(); }
      });
      caches.keys().then(function(names) {
        for (var name of names) { caches.delete(name); }
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
