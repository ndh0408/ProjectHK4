<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366F1" />
    <meta
      name="description"
      content="LUMA Admin — manage events, users and revenue in one place."
    />
    <!--
      Disable browser auto-translate (Google Translate / Cốc Cốc / Chrome).
      Auto-translating mutates DOM text nodes which breaks React reconciliation
      with errors like "Failed to execute 'insertBefore' on 'Node'".
    -->
    <meta name="google" content="notranslate" />
    <meta name="robots" content="notranslate" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Disable browser cache so UI always reflects latest code -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>LUMA Admin</title>
  </head>
  <body class="notranslate">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Kill any service worker registered by previous production builds -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          for (var reg of registrations) { reg.unregister(); }
        });
        if (window.caches) {
          caches.keys().then(function (names) {
            for (var name of names) { caches.delete(name); }
          });
        }
      }
    </script>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
