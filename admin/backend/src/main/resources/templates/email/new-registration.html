<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Registration</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .email-wrapper { background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); padding: 30px 40px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: #ffffff; letter-spacing: 2px; }
        .content { padding: 40px; }
        .greeting { font-size: 18px; margin-bottom: 20px; }
        .info-box { background-color: #eff6ff; border-left: 4px solid #3b82f6; padding: 15px; margin: 20px 0; border-radius: 0 8px 8px 0; }
        .registrant-card { background-color: #f8f9fa; border-radius: 8px; padding: 20px; margin: 20px 0; }
        .registrant-name { font-size: 18px; font-weight: 600; color: #6366f1; margin-bottom: 10px; }
        .registrant-detail { margin-bottom: 8px; color: #666; }
        .btn { display: inline-block; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: #ffffff !important; text-decoration: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; margin: 20px 0; }
        .footer { background-color: #f8f9fa; padding: 30px 40px; text-align: center; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="email-wrapper">
            <div class="header">
                <div class="logo">LUMA</div>
            </div>
            <div class="content">
                <p class="greeting">Hi <span th:text="${organiserName}">there</span>,</p>

                <div class="info-box">
                    You have a new registration for <strong th:text="${eventTitle}">your event</strong>!
                </div>

                <div class="registrant-card">
                    <div class="registrant-name" th:text="${registrantName}">Attendee Name</div>
                    <div class="registrant-detail">
                        <strong>Email:</strong> <span th:text="${registrantEmail}">email@example.com</span>
                    </div>
                </div>

                <p style="text-align: center;">
                    <a th:href="${registrationsUrl}" class="btn">View All Registrations</a>
                </p>
            </div>
            <div class="footer">
                <p>This email was sent by LUMA Events</p>
                <p style="font-size: 12px; color: #999;">You received this email because someone registered for your event on LUMA.</p>
            </div>
        </div>
    </div>
</body>
</html>
